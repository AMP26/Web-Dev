<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <form>
        <label for="username">username:</label>
        <input type="text" id="username" required>
        <br>
        <br>
        <label for="password">password:</label>
        <input type="password" id="password" required>
        <br>
        <br>
        <label for="email">e-mail:</label>
        <input type="email" id="email" required>
        <br>
        <br>
        <label for="phone">phone:</label>
        <input type="phone" id="phone" required>
        <br>
        <br>
        <label for="dob">dob:</label>
        <input type="date" id="dob">
        <br>
        <br>
        <label for="family-member">family members:</label>
        <input type="number" min="0" max="10" value="1" id="family-member">
        <br>
        <br>
        <label for="gender">gender:</label>
        <label for="male">male</label>
        <input type="radio" id="male" name="gender">

        <label for="female">female</label>
        <input type="radio" id="female" name="gender">
        <br>
        <br>
        <label for="country">country:</label>
       <select>
            <option value="india"">india</option>
            <option value="us">us</option>
            <option value="uk">uk</option>
       </select>
        <br>
        <br>
        <label for="hobby">hobby:</label>
        <input type="checkbox" id="swimming">
        <label for="swimming">swimming</label>
        
        <input type="checkbox" id="reading">    
        <label for="reading">reading</label>

        <input type="checkbox" id="dancing">
        <label for="dancing">dancing</label>
        <br>
        <br>
        <label for="about">about:</label>
        <textarea id="about" rows="3" cols="25"></textarea>
        <br>
        <br>
        <label for="image">upload image:</label>
        <input type="file" id="image" accept="image.jpg, image/png, image/jpeg">
        <br>
        <br>
        
        <input type="submit">
    </form>
</body>
</html>
